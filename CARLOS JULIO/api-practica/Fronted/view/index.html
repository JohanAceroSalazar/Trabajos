<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/Fronted/css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid justify-content-center">

        <div class="d-flex gap-3">
            <a class="nav-link text-white" href="#" onclick="loadProducts()">Productos</a>
            <a class="nav-link text-white" href="#" onclick="loadUsers()">Usuarios</a>
            <a class="nav-link text-white" href="#" onclick="loadPosts()">Posts</a>
            <a class="nav-link text-white" href="#" onclick="loadCarts()">Carts</a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <!-- ================= PRODUCTOS ================= -->
    <div id="productsSection">

        <h1 class="text-center mb-4">Lista de Productos</h1>

        <!-- BUSCAR -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5>Buscar / Eliminar por ID</h5>

            <div class="row">
                <div class="col-md-4">
                    <input id="productId" type="number" class="form-control" placeholder="Ingrese ID">
                </div>

                <div class="col-md-8 d-flex gap-2">
                    <button class="btn btn-success" onclick="getFindByIdP()">Buscar</button>
                    <button class="btn btn-primary" onclick="getAllProducts()">Consultar</button>
                    <button class="btn btn-danger" onclick="deleteByIdPro()">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5>Agregar / Editar Producto</h5>

            <div class="row g-2">
                <div class="col-md-2">
                    <input id="id" type="number" class="form-control" placeholder="ID">
                </div>

                <div class="col-md-3">
                    <input id="title" type="text" class="form-control" placeholder="Título">
                </div>

                <div class="col-md-3">
                    <input id="description" type="text" class="form-control" placeholder="Descripción">
                </div>

                <div class="col-md-2">
                    <input id="category" type="text" class="form-control" placeholder="Categoría">
                </div>

                <div class="col-md-2">
                    <input id="price" type="number" step="0.01" class="form-control" placeholder="Precio">
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-success" onclick="createProduct()">Crear</button>
                <button class="btn btn-warning" onclick="updateProduct()">Actualizar</button>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card p-3 shadow-sm">
            <table class="table table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Id</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody id="container"></tbody>
            </table>
        </div>

    </div>

    <!-- ================= USERS ================= -->
    <div id="usersSection" style="display:none;">

        <h1 class="text-center mb-4">Lista de Usuarios</h1>

        <!-- BUSCAR -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5>Buscar / Eliminar por ID</h5>

            <div class="row">
                <div class="col-md-4">
                    <input id="userId" type="number" class="form-control" placeholder="Ingrese ID">
                </div>

                <div class="col-md-8 d-flex gap-2">
                    <button class="btn btn-success" onclick="getUserById()">Buscar</button>
                    <button class="btn btn-primary" onclick="getAllUsers()">Consultar</button>
                    <button class="btn btn-danger" onclick="deleteByIdUser()">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="card p-3 mb-4 shadow-sm">
            <h5>Agregar / Editar Usuario</h5>

            <div class="row g-2">
                <div class="col-md-2">
                    <input id="idUser" type="number" class="form-control" placeholder="ID">
                </div>

                <div class="col-md-3">
                    <input id="firstName" type="text" class="form-control" placeholder="Nombre">
                </div>

                <div class="col-md-3">
                    <input id="lastName" type="text" class="form-control" placeholder="Apellido">
                </div>

                <div class="col-md-2">
                    <input id="age" type="number" class="form-control" placeholder="Edad">
                </div>

                <div class="col-md-2">
                    <input id="gender" type="text" class="form-control" placeholder="Género">
                </div>
            </div>

            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-success" onclick="createUser()">Crear</button>
                <button class="btn btn-warning" onclick="updateUser()">Actualizar</button>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card p-3 shadow-sm">
            <table class="table table-striped text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Id</th>
                        <th>firstName</th>
                        <th>lastName</th>
                        <th>age</th>
                        <th>gender</th>
                    </tr>
                </thead>
                <tbody id="usersContainer"></tbody>
            </table>
        </div>

    </div>

</div>

<!-- Scripts -->
<script src="/Fronted/js/const.js"></script>
<script src="/Fronted/js/utils.js"></script>
<script src="/Fronted/js/api.js"></script>
<script src="/Fronted/js/products.js"></script>
<script src="/Fronted/js/users.js"></script>
<script src="/Fronted/js/posts.js"></script>
<script src="/Fronted/js/carts.js"></script>

<script>
function hideAll(){
    document.getElementById("productsSection").style.display = "none";
    document.getElementById("usersSection").style.display = "none";
}

function loadProducts(){
    hideAll();
    document.getElementById("productsSection").style.display = "block";
}

function loadUsers(){
    hideAll();
    document.getElementById("usersSection").style.display = "block";
}
</script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
